<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada</title>
    <style>
        /* Estilos base */
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            text-align: center;
        }

        /* Animación del número 404 */
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 2rem;
            margin: 0;
        }

        p {
            color: #777;
            margin: 1rem 0 2rem;
        }

        /* Botón de regreso */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #6e8efb;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: background 0.3s ease, transform 0.2s;
            box-shadow: 0 4px 15px rgba(110, 142, 251, 0.4);
        }

        .btn:hover {
            background-color: #5a7be2;
            transform: scale(1.05);
        }

        /* Pequeño detalle decorativo: un círculo CSS */
        .circle {
            position: absolute;
            background: rgba(110, 142, 251, 0.1);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="circle" style="width: 300px; height: 300px; top: -50px; left: -50px;"></div>
    <div class="circle" style="width: 200px; height: 200px; bottom: 20px; right: 20px;"></div>

    <div class="container">
        <h1 class="error-code">404</h1>
        <h1>¡Ups! Te has perdido</h1>
        <p>La página que buscas no existe o ha sido movida a otro lugar.</p>
        <a href="/" class="btn">Volver al inicio</a>
    </div>

</body>
</html>
